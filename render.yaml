services:
  - type: web
    name: student-gpa-predictor
    runtime: python
    rootDir: summative/API
    buildCommand: "pip install --only-binary :all: -r requirements.txt"
    startCommand: "uvicorn prediction:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYENV_VERSION
        value: 3.11.10
